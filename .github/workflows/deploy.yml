name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Rust toolchain (matches contracts/ajo-circle/rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.76.0
        with:
          targets: wasm32-unknown-unknown

      - name: Build & unit-test Soroban contract
        working-directory: contracts/ajo-circle
        run: |
          cargo build --target wasm32-unknown-unknown --release
          cargo test --lib

      - name: Prisma Generate
        run: pnpm prisma generate

      - name: Next.js build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars-long
        run: pnpm build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./
